services:
  postgres:
    image: postgres:18-alpine
    container_name: onboarding-rabbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onboarding
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onboarding -d onboarding"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: onboarding-rabbit-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: onboarding
      RABBITMQ_DEFAULT_PASS: onboarding
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # management UI — http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

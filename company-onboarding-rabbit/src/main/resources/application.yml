spring:
  application:
    name: company-onboarding-rabbit
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/onboarding
    username: onboarding
    password: onboarding
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: onboarding
    password: onboarding
    listener:
      simple:
        # One message at a time per consumer — matches how Postgres variant
        # ran exactly one orchestration per virtual thread. Tune up for
        # parallel onboardings.
        prefetch: 1
        concurrency: 1
        max-concurrency: 4
        # Don't requeue on exception. Steps aren't rerun-safe (commits are
        # partial), so retry must be explicit, not automatic.
        default-requeue-rejected: false

server:
  port: 8080

logging:
  level:
    com.example.onboarding: DEBUG

spring:
  application:
    name: company-onboarding-sqs
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5434/onboarding
    username: onboarding
    password: onboarding
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

aws:
  region: us-east-1
  # LocalStack endpoint. In prod (real AWS) leave endpoint blank and rely on the SDK's
  # default credential + region chain (env vars, IAM role, ~/.aws/config).
  endpoint: http://localhost:4566
  access-key: test
  secret-key: test
  sqs:
    queue-url: http://localhost:4566/000000000000/onboarding-start-queue
    # Long-poll wait (seconds). 20 is the SQS max — minimizes empty-response cost.
    wait-time-seconds: 20
    # Max messages per receive call. 10 is the SQS max.
    max-messages: 10
    # How many consumer threads poll the queue.
    consumer-threads: 2

server:
  port: 8080

logging:
  level:
    com.example.onboarding: DEBUG
    software.amazon.awssdk: WARN
